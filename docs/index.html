<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>לוח אירועים</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      direction: rtl;
      text-align: right;
      margin: 24px;
      background: #fafafa;
    }

    .controls {
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .calendar-options {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 24px;
      margin-top: 12px;
    }

    label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      cursor: pointer;
    }

    iframe {
      display: block;
      width: 100%;
      height: 900px;
      border: 0;
    }

    .calendar-wrapper {
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      overflow: hidden;
    }

    .hint {
      margin-top: 12px;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <h1>לוח אירועים</h1>

  <div class="controls">
    <strong>יומנים:</strong>
    <div id="calendarOptions" class="calendar-options"></div>
    <div class="hint">אפשר לבחור יומן אחד או כמה יחד.</div>
  </div>

  <div class="calendar-wrapper">
    <iframe id="calendarFrame"></iframe>
  </div>

  <script>
  
    const COMMUNITY_COLOR = "#3F51B5";
    const DISTRICT_COLOR = "#D32F2F";

    let calendars = [
      {
        "name": "קהילת אזורי חן, למד וכוכב הצפון",
        "id": "demotlvevents@gmail.com"
      },
      {
        "name": "קהילת עבר הירקון",
        "id": "5507509eff13b79141601a3843dbfadab94423571c9f800c6a9ae425a47e9b88@group.calendar.google.com"
      },
      {
        "name": "מטה מחוז תל אביב",
        "id": "838e9ac0cc7224975243b51f10fc0aa60bdfef6a04438718fb8f8337c655040b@group.calendar.google.com"
      }
    ];

    function createCalendarSelectors() {
      const container = document.getElementById("calendarOptions");
      container.innerHTML = "";

      calendars.forEach((calendar, index) => {
        const label = document.createElement("label");

        label.innerHTML = `
          <input type="checkbox" id="calendar-${index}" checked />
          ${calendar.name}
        `;

        container.appendChild(label);

        document
          .getElementById(`calendar-${index}`)
          .addEventListener("change", updateCalendar);
      });
    }

    function buildCalendarUrl() {
      const params = [];

      calendars.forEach((calendar, index) => {
        if (!document.getElementById(`calendar-${index}`).checked) {
          return;
        }

        params.push("src=" + encodeURIComponent(calendar.id));

        const color =
          calendar.name === "מטה מחוז תל אביב"
            ? DISTRICT_COLOR
            : COMMUNITY_COLOR;

        params.push("color=" + encodeURIComponent(color));
      });

      if (params.length === 0) {
        return "";
      }

      return (
        "https://calendar.google.com/calendar/embed?" +
        params.join("&") +
        "&ctz=Asia%2FJerusalem" +
        "&mode=MONTH" +
        "&showTitle=0" +
        "&showNav=1" +
        "&showTabs=0" +
        "&showCalendars=0" +
        "&showPrint=0" +
        "&wkst=1"
      );
    }

    function updateCalendar() {
      const frame = document.getElementById("calendarFrame");
      const url = buildCalendarUrl();

      if (!url) {
        frame.srcdoc = `
          <div style="
            font-family: Arial, sans-serif;
            direction: rtl;
            padding: 40px;
            text-align: center;
            color: #555;
          ">
            נא לבחור לפחות יומן אחד להצגה
          </div>
        `;
        return;
      }

      frame.removeAttribute("srcdoc");
      frame.src = url;
    }

    loadCalendars();
  </script>
</body>
</html>
